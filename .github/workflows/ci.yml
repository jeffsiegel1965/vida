name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  kaspa-core:
    name: Kaspa core + TAO tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Core wallet QA (13)
        run: python tests/qa_tests.py

      - name: Secure wallet QA (14)
        run: python tests/qa_secure_tests.py

      - name: TAO plugin tests (62)
        run: python -m unittest discover -s tests -p 'test_tao*.py'