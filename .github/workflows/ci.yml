name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  kaspa-core:
    name: Kaspa core + TAO tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install kaspa cryptography aiohttp "substrate-interface>=1.7.0,<2" bittensor mnemonic mcp pytest pytest-anyio
          # pqcrypto is optional — if it fails, PQ tests are skipped gracefully
          pip install pqcrypto 2>/dev/null || true

      - name: Install Vida package
        run: pip install -e .

      - name: Run full test suite
        run: python -m pytest tests/ --tb=short