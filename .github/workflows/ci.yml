name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  kaspa-core:
    name: Kaspa core + TAO tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install kaspa cryptography aiohttp "substrate-interface>=1.7.0,<2" mnemonic mcp
          # pqcrypto is optional — if it fails, PQ tests are skipped gracefully
          pip install pqcrypto 2>/dev/null || true

      - name: Core wallet QA (13)
        run: PYTHONPATH=$PWD VIDA_LEGACY_WALLET_ALLOWED=1 python tests/qa_tests.py

      - name: Secure wallet QA (14)
        run: PYTHONPATH=$PWD VIDA_LEGACY_WALLET_ALLOWED=1 python tests/qa_secure_tests.py

      - name: TAO plugin tests (62)
        run: PYTHONPATH=$PWD python -m unittest discover -s tests -p 'test_tao*.py'