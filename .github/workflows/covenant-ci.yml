name: Covenant CI

on:
  push:
    branches: [main]
    paths:
      - 'vida/plugins/covenant/**'
      - 'tests/test_covenant_*'
      - 'scripts/covenant_*'
      - '.github/workflows/covenant-ci.yml'
  pull_request:
    paths:
      - 'vida/plugins/covenant/**'

jobs:
  test-covenant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt pytest

      - name: Run covenant offline tests
        run: |
          source .venv/bin/activate
          PYTHONPATH=$PWD python3 -m pytest tests/test_covenant_scaffold.py -v
          PYTHONPATH=$PWD python3 -m pytest tests/test_covenant_robustness.py -v